<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typing bird — hyperframes 录制合成</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #b6c3ba; overflow: hidden; }
  #stage { position: relative; width: 720px; height: 960px; }
  #stage canvas { display: block; }
  #overlay, #controls { display: none; }
</style>
</head>
<body>
  <div id="stage" data-composition-id="typewriter" data-start="0" data-duration="22"
       data-track-index="0" data-width="720" data-height="960">
    <div id="overlay"><div class="tip"></div><div class="sub"></div></div>
    <div id="controls">
      <button id="btn-replay"></button>
      <button id="btn-sound"></button>
      <button id="btn-voice"></button>
    </div>
  </div>
  <script>window.__HF_RENDER = true;</script>
  <!-- 必须用根绝对路径:hyperframes 会把入口 HTML 扁平化为 /record.html,相对路径会 404 -->
  <script src="/lib/p5.min.js"></script>
  <script src="/engine/core.js"></script>
  <script src="/engine/input.js"></script>
  <script src="/engine/recipes.js"></script>
  <script src="/engine/audio-bus.js"></script>
  <script src="/scenes/typewriter/scene.js"></script>
  <script src="/lib/gsap.min.js"></script>
  <script>
    // hyperframes 契约:注册一条 paused GSAP 时间线,渲染器逐帧 seek
    Engine.registerTimeline();
  </script>
</body>
</html>
