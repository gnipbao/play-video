<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLAY VIDEO — GeekCatX 交互动画集</title>
<meta name="description" content="程序化交互动画作品集:p5.js 交互动画 → 确定性渲染 → 音画同源配乐。每件作品都可以点进去亲手玩。">
<link rel="stylesheet" href="gallery/gallery.css">
</head>
<body>
  <div class="wrap">
    <header>
      <div class="mark"></div>
      <h1><span class="en">PLAY VIDEO</span><br>交互动画集</h1>
      <p class="tagline">
        把交互写进画面:p5.js 程序化动画 → hyperframes 确定性渲染 →
        音画同源配乐 → ffmpeg 出片。这里每件作品都有两种看法——
        看正片,或者点进去亲手玩。
      </p>
      <div class="sign">@GeekCatX</div>
    </header>

    <main id="grid" class="grid"><!-- 卡片由 gallery.js 按 works.js 生成 --></main>

    <footer>
      <span>p5.js · hyperframes · Web Audio · ffmpeg</span>
      <span>画面与声音同一套触发,逐帧可复现</span>
      <span class="red">@GeekCatX</span>
    </footer>
  </div>

  <!-- 有声正片灯箱 -->
  <div id="lightbox" role="dialog" aria-modal="true" aria-label="有声正片播放器" aria-hidden="true">
    <button class="close" id="lb-close" title="关闭 (Esc)">×</button>
    <video id="lb-video" controls playsinline></video>
    <div class="cap" id="lb-cap"></div>
  </div>

  <script src="gallery/works.js?v=3"></script>
  <script src="gallery/gallery.js?v=3"></script>
</body>
</html>
